name: cicd

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  update-dev:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Fetch OpenAPI Spec from FastAPI
        run: |
          curl -fsSL https://petstore.swagger.io/v2/swagger.json -o swagger.json
          ls -l swagger.json

      - name: Register API to IBM APIGW
        id: register-api
        uses: jiridj/wm-apigw-actions-register-api@v1
        with:
          apigw-url: http://20.198.251.142:5555
          apigw-username: ${{ secrets.APIGW_USERNAME }}
          apigw-password: ${{ secrets.APIGW_PASSWORD }}
          api-spec: swagger.json
          set-active: true
          debug: true

      - name: Show registered API info
        run: |
          echo "API ID = ${{ steps.register-api.outputs.api-id }}"
          echo "Policy template target = Policy_1"

      - name: Debug policy template endpoints
        continue-on-error: true
        run: |
          API_ID="${{ steps.register-api.outputs.api-id }}"
          echo "API ID = $API_ID"

          echo "=== Try list policy templates ==="
          curl -i -u "${{ secrets.APIGW_USERNAME }}:${{ secrets.APIGW_PASSWORD }}" \
            "http://20.198.251.142:5555/rest/apigateway/policy-templates"

          echo
          echo "=== Try get API details ==="
          curl -i -u "${{ secrets.APIGW_USERNAME }}:${{ secrets.APIGW_PASSWORD }}" \
            "http://20.198.251.142:5555/rest/apigateway/apis/${API_ID}"