name: cicd

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  update-dev:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Fetch OpenAPI Spec from FastAPI
        run: |
          curl -s https://petstore.swagger.io/v2/swagger.json -o swagger.json
          ls -l swagger.json

      - name: Register API to IBM APIGW
        id: register-api
        uses: jiridj/wm-apigw-actions-register-api@v1
        with:
          apigw-url: http://20.198.251.142:5555
          apigw-username: ${{ secrets.APIGW_USERNAME }}
          apigw-password: ${{ secrets.APIGW_PASSWORD }}
          api-spec: swagger.json
          set-active: true
          debug: true

      # ขั้นตอนใหม่: apply policy template "Policy_1"
      - name: Apply policy template Policy_1
        run: |
          echo "API ID = ${{ steps.register-api.outputs.api-id }}"

          # ตัวอย่างแนวทาง:
          # 1) หา policy template id จากชื่อ Policy_1
          # 2) apply template ให้กับ api-id ที่เพิ่ง register
          #
          # NOTE:
          # endpoint และ payload อาจต่างกันตาม version ของ webMethods API Gateway
          # ต้องอิง REST API ของ instance ที่คุณใช้อยู่

          curl -u "${{ secrets.APIGW_USERNAME }}:${{ secrets.APIGW_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -X POST \
            "http://20.198.251.142:5555/rest/apigateway/apis/${{ steps.register-api.outputs.api-id }}/policytemplates/apply" \
            -d '{
              "policyTemplateName": "Policy_1"
            }'