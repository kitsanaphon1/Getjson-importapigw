name: CI/CD - Register API to IBM APIGW

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  # ตั้งค่าตัวแปรกลางที่นี่ เพื่อให้ง่ายต่อการแก้ไข
  APIGW_BASE_URL: "http://20.198.251.142:5555/rest/apigateway"
  POLICY_TEMPLATE_ID: "Policy_1"

jobs:
  update-api:
    runs-on: ubuntu-latest
    # รันเมื่อมีการ Push เข้า main หรือมีการสร้าง Tag v*
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: development

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch OpenAPI Spec
        run: |
          # ดึง Spec จากต้นทาง (ปรับ URL ตามจริง)
          curl -fsSL https://petstore.swagger.io/v2/swagger.json -o swagger.json

      - name: Register API to IBM APIGW
        id: register-api
        uses: jiridj/wm-apigw-actions-register-api@v1
        with:
          apigw-url: "http://20.198.251.142:5555"
          apigw-username: ${{ secrets.APIGW_USERNAME }}
          apigw-password: ${{ secrets.APIGW_PASSWORD }}
          api-spec: swagger.json
          set-active: true
          debug: true

      - name: Apply Policy Template
        if: success()
        run: |
          API_ID="${{ steps.register-api.outputs.api-id }}"
          echo "Applying Policy: ${{ env.POLICY_TEMPLATE_ID }} to API ID: $API_ID"
          
          # ส่ง Request พร้อมตรวจสอบ HTTP Status Code (-w %{http_code})
          RESPONSE=$(curl -s -u "${{ secrets.APIGW_USERNAME }}:${{ secrets.APIGW_PASSWORD }}" \
            -X PUT \
            -H "Content-Type: application/json" \
            -d "{\"templateId\": \"${{ env.POLICY_TEMPLATE_ID }}\"}" \
            -w "|%{http_code}" \
            "${{ env.APIGW_BASE_URL }}/apis/${API_ID}/policy-templates")

          HTTP_STATUS=$(echo "$RESPONSE" | awk -F'|' '{print $2}')
          
          if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "201" ]]; then
            echo "❌ Failed to apply policy. Status: $HTTP_STATUS"
            echo "Response: $RESPONSE"
            exit 1
          fi
          echo "✅ Policy applied successfully."

      - name: Verify API Status & Health
        if: success()
        run: |
          API_ID="${{ steps.register-api.outputs.api-id }}"
          
          # ดึงข้อมูล API มาเช็คด้วย jq
          API_DATA=$(curl -s -u "${{ secrets.APIGW_USERNAME }}:${{ secrets.APIGW_PASSWORD }}" \
            "${{ env.APIGW_BASE_URL }}/apis/${API_ID}")
          
          # ตรวจสอบว่า API Active จริงหรือไม่ (Path ใน JSON ของ IBM มักจะเป็น .api.isActive)
          IS_ACTIVE=$(echo "$API_DATA" | jq -r '.api.isActive // .isActive')
          API_NAME=$(echo "$API_DATA" | jq -r '.api.apiName // .apiName')

          echo "--------------------------------------"
          echo "API Name: $API_NAME"
          echo "API Status Active: $IS_ACTIVE"
          echo "--------------------------------------"

          if [ "$IS_ACTIVE" != "true" ]; then
            echo "❌ Error: API is registered but NOT active!"
            exit 1
          fi
          echo "🚀 Deployment Verified: API is up and running."