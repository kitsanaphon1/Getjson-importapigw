name: cicd

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  update-dev:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout โค้ดเพื่อให้อ่านไฟล์ api_list.txt ได้
      - uses: actions/checkout@v4

      # 2. อ่านไฟล์และวนลูป
      - name: Fetch and Register APIs from File
        run: |
          # วนลูปอ่านทีละบรรทัดจากไฟล์ api_list.txt
          while IFS= read -r api_url || [ -n "$api_url" ]; do
            
            # ป้องกันกรณีเจอบรรทัดว่างให้ข้ามไป
            if [ -z "$api_url" ]; then continue; fi
            
            echo "====================================="
            echo "🚀 Processing API: $api_url"
            
            # โหลด Spec มาเก็บไว้ในไฟล์ swagger.json
            curl -s "$api_url" -o swagger.json
            
            # ยิงไฟล์ swagger.json เข้า IBM API Gateway
            curl -X POST "http://20.198.251.142:5555/rest/apigateway/apis" \
              -u "${{ secrets.APIGW_USERNAME }}:${{ secrets.APIGW_PASSWORD }}" \
              -H "Content-Type: application/json" \
              -d @swagger.json
              
            echo "✅ Finished: $api_url"
            
          done < api_list.txt