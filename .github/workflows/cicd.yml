name: cicd

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # --- Job 1: อ่านไฟล์ api_list.txt และแปลงเป็นตัวแปร Matrix ---
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse api_list.txt
        id: set-matrix
        run: |
          # อ่านไฟล์ ลบบรรทัดว่าง รองรับ \r และแปลงเป็น JSON Array ให้ GitHub เข้าใจ
          JSON_ARRAY=$(cat api_list.txt | tr -d '\r' | awk 'NF' | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  # --- Job 2: นำ Matrix ที่ได้มารัน Register ทีละตัว ---
  update-dev:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # ถ้ามี URL ไหนพัง ให้รันตัวที่เหลือต่อไปจนจบ
      max-parallel: 5 # ป้องกันการยิงเข้า IBM API Gateway พร้อมกันรัวเกินไป (ปรับเลขได้)
      matrix:
        api_url: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      
      # 1. โหลด Spec มาเก็บไว้ โดยรักษานามสกุลไฟล์เดิมไว้ (.json หรือ .yaml)
      - name: Fetch API Spec
        id: fetch-spec
        run: |
          curl -sLO "${{ matrix.api_url }}"
          FILENAME=$(basename "${{ matrix.api_url }}")
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      # 2. ใช้ Action ท่ามาตรฐานในการ Register
      - name: Register API to IBM APIGW
        uses: jiridj/wm-apigw-actions-register-api@v1
        with: 
          apigw-url: http://20.198.251.142:5555
          apigw-username: ${{ secrets.APIGW_USERNAME }}
          apigw-password: ${{ secrets.APIGW_PASSWORD }}
          api-spec: ${{ steps.fetch-spec.outputs.filename }}
          set-active: true