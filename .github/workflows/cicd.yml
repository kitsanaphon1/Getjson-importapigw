name: cicd

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  update-dev:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Fetch OpenAPI Spec from FastAPI
        run: |
          curl -fsSL https://petstore.swagger.io/v2/swagger.json -o swagger.json
          ls -l swagger.json

      - name: Register API to IBM APIGW
        id: register-api
        uses: jiridj/wm-apigw-actions-register-api@v1
        with:
          apigw-url: http://20.198.251.142:5555
          apigw-username: ${{ secrets.APIGW_USERNAME }}
          apigw-password: ${{ secrets.APIGW_PASSWORD }}
          api-spec: swagger.json
          set-active: true
          debug: true

      - name: Show registered API info
        run: |
          echo "API ID = ${{ steps.register-api.outputs.api-id }}"
          echo "Policy template target = Policy_1"

      # ยังไม่ apply template อัตโนมัติ เพราะ endpoint ที่ถูกต้องของ instance นี้
      # ยังไม่ได้ยืนยันจาก official doc/API spec
      # ถ้าใส่ endpoint เดาผิด จะโดนตีความเป็น create API และ fail เหมือนเดิม
      - name: Skip policy template apply for now
        run: |
          echo "Skipped auto-apply policy template Policy_1"
          echo "Reason: official apply-template REST endpoint for this APIGW instance/version is not yet confirmed"