name: cicd

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  update-dev:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: development
    steps:
      - uses: actions/checkout@v4

      # ขั้นตอนที่ 1: ไปดึง Spec จาก FastAPI Server ของคุณ
      - name: Fetch OpenAPI Spec from FastAPI
        run: |
          curl -s https://petstore.swagger.io/v2/swagger.json -o swagger.json
          ls -l swagger.json

      # ขั้นตอนที่ 2: Import เข้า API Gateway
      - name: Register API to APIGW
        id: register-api # 🔴 สำคัญมาก! ต้องมี id นี้ เพื่อให้ Step ต่อไปดึงค่า API_ID ไปใช้ได้
        uses: jiridj/wm-apigw-actions-register-api@v1
        with: 
          apigw-url: http://20.198.251.142:5555
          apigw-username: ${{ secrets.APIGW_USERNAME }}
          apigw-password: ${{ secrets.APIGW_PASSWORD }}
          api-spec: swagger.json
          set-active: true
          debug: true

      # ขั้นตอนที่ 3: เอา API ที่ได้ไปผูกกับ Policy Template
      - name: Apply Policy Template
        if: success()
        run: |
          # 1. ดึง ID มาจาก Step ที่แล้ว (ถ้าไม่มี id ใน step บน บรรทัดนี้จะว่างเปล่า)
          API_ID="${{ steps.register-api.outputs.api-id }}"
          
          if [ -z "$API_ID" ] || [ "$API_ID" == "null" ]; then
            echo "❌ Error: API_ID is empty! Action register-api might not have returned an ID."
            exit 1
          fi
          
          echo "✅ Applying Policy to API ID: $API_ID"
          
          # 2. ดึงข้อมูล API ปัจจุบันออกมา
          API_JSON=$(curl -s -u "${{ secrets.APIGW_USERNAME }}:${{ secrets.APIGW_PASSWORD }}" \
            -H "Accept: application/json" \
            "http://20.198.251.142:5555/rest/apigateway/apis/${API_ID}")
            
          # ตรวจสอบว่า Response ที่ได้มาเป็น JSON ที่ถูกต้องหรือไม่ (ดักทาง error jq)
          if ! echo "$API_JSON" | jq . >/dev/null 2>&1; then
            echo "❌ Error: API Gateway returned non-JSON response."
            echo "Raw Response: $API_JSON"
            exit 1
          fi

          # 3. ยัด Policy Template เข้าไปใน JSON ก้อนเดิม
          UPDATED_JSON=$(echo "$API_JSON" | jq '.policyTemplates = (.policyTemplates // []) + [{"id": "Policy_1"}]')
          
          # 4. อัปเดตกลับไปที่ Gateway
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -u "${{ secrets.APIGW_USERNAME }}:${{ secrets.APIGW_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$UPDATED_JSON" \
            "http://20.198.251.142:5555/rest/apigateway/apis/${API_ID}")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "🎉 Policy Applied Successfully! (HTTP $HTTP_STATUS)"
          else
            echo "❌ Failed to Apply Policy. HTTP Status: $HTTP_STATUS"
            exit 1
          fi